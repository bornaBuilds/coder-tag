name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile, lint, and test
        run: xvfb-run -a npm test

      - name: Package extension
        run: npm exec vsce package -- --no-yarn --out coder-tag.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: coder-tag-vsix
          path: coder-tag.vsix
